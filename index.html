<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Cartoons</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dmreo4vtx/image/upload/v1782189046/favicon.png_udwwpt.jpg">
</head>
<body>
    <header>
        <h1>Welcome to Toon Trove</h1>
        <p>Watch your favorite cartoons for free!</p>
    </header>

    <div class="container">
        <h2>Choose Your Cartoon</h2>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px;">

            <!-- Doraemon Card -->
            <div class="card" onclick="window.location.href='doraemon.html'">
                <img src="https://res.cloudinary.com/dtbsuuoa3/image/upload/v1782175484/dora1_qokewy.jpg" alt="Doraemon">
                <div class="card-content">
                    <h3>Doraemon</h3>
                    <p>Watch all episodes of Doraemon</p>
                </div>
            </div>

            <!-- Chota Bheem Card -->
            <div class="card" onclick="window.location.href='chota-bheem.html'">
                <img src="https://res.cloudinary.com/dtbsuuoa3/image/upload/v1782175484/bheem1_z0cd2g.jpg" alt="Chota Bheem">
                <div class="card-content">
                    <h3>Chota Bheem</h3>
                    <p>Watch all episodes of Chota Bheem</p>
                </div>
            </div>
            <!-- Add more cartoons here same way -->
             <!-- Chota Bheem Card -->
            <div class="card" onclick="window.location.href='chota-bheem-movies.html'">
                <img src="https://res.cloudinary.com/dtbsuuoa3/image/upload/v1782175484/bheem1_z0cd2g.jpg" alt="Chota Bheem">
                <div class="card-content">
                    <h3>Chota Bheem</h3>
                    <p>Watch all Movies of Chota Bheem</p>
                </div>
            </div>
            
        </div>
    </div>
</body>
</html>
