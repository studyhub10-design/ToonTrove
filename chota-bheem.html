                      <!-- The Native Video Player Setup -->
        <div class="video-container" id="player" style="display:none; margin-top: 40px;">
            <h2>Now Playing</h2>

    <script>
        function playVideo(btn) {
            const videoUrl = btn.getAttribute('data-video');
            const player = document.getElementById('player');
            const video = document.getElementById('videoPlayer');

            if (videoUrl && videoUrl.startsWith('http')) {
                player.style.display = 'block';
                video.src = videoUrl;
                video.load(); // Tells the browser to download the Cloudinary stream
                video.play().catch(function(error) {
                    console.log("Click play manually.");
                });
                player.scrollIntoView({ behavior: "smooth" });
            } else {
                alert("Please add a valid video link to this button!");
            }
        }
    </script>
