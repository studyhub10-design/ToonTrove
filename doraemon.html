<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doraemon - Fun Cartoons</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dmreo4vtx/image/upload/v1782189046/favicon.png_udwwpt.jpg">
</head>
<body>
    <header>
        <h1>Doraemon</h1>
        <a href="index.html" style="color:white; margin-left:20px;">← Back to Home</a>
    </header>

    <div class="container">
        <h2>All Episodes</h2>

        <div class="episode-grid">

            <!-- Episode 1 -->
            <div class="card">
                <img src="images/doraemon-ep1.jpg" alt="Episode 1">
                <div class="card-content">
                    <h3>Episode 1 - Nobita and the Magic Fan</h3>
                    <p>Short description: Nobita gets a magical fan...</p>
                    <button onclick="playVideo(this)" data-video="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4">
                        ▶ Play
                    </button>
                </div>
            </div>

            <!-- Episode 2 -->
            <div class="card">
                <img src="images/doraemon-ep2.jpg" alt="Episode 2">
                <div class="card-content">
                    <h3>Episode 2 - The Time Machine</h3>
                    <p>Short description: Doraemon and Nobita travel in time...</p>
                    <button onclick="playVideo(this)" data-video="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4">
                        ▶ Play
                    </button>
                </div>
            </div>

        </div>

        <!-- Video Player -->
        <div class="video-container" id="player" style="display:none;">
            <video id="videoPlayer" controls autoplay></video>
        </div>
    </div>

    <script>
        function playVideo(btn) {
            const videoUrl = btn.getAttribute('data-video');
            const player = document.getElementById('player');
            const video = document.getElementById('videoPlayer');
            
            video.src = videoUrl;
            player.style.display = 'block';
            video.play();
            
            // Scroll to video
            player.scrollIntoView({ behavior: "smooth" });
        }
    </script>
</body>
</html>
