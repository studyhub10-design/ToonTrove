<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doraemon - Fun Cartoons</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dmreo4vtx/image/upload/v1782189046/favicon.png_udwwpt.jpg">
    <link rel="stylesheet"
href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-M18V61F355');
</script>
</head>
<body>
    <header>
        <h1>Doraemon</h1>
        <a href="index.html" style="color:white; margin-left:20px;">← Back to Home</a>
    </header>

    <div class="container">
        <h2>All Episodes</h2>

        <div class="episode-grid">

            <!-- Episode 1 -->
            <div class="card">
                <img src="https://res.cloudinary.com/dtbsuuoa3/image/upload/v1782175484/dora1_qokewy.jpg" alt="Episode 1">
                <div class="card-content">
                    <h3>Episode 1 - NO TENSION</h3>
                    <p>Short description: Nobita giving Legendary Advice</p>
                    <button class="play-btn" onclick="playVideo(this)" data-video="https://res.cloudinary.com/dtbsuuoa3/video/upload/v1782296089/Dora-ep1_eplj8e.mp4">
                        ▶ Play Episode 1
                    </button>
                </div>
            </div>

            <!-- Episode 2 -->
            <div class="card">
                <img src="https://res.cloudinary.com/dtbsuuoa3/image/upload/v1782175484/dora1_qokewy.jpg" alt="Episode 2">
                <div class="card-content">
                    <h3>Episode 2 - ACTION TIME</h3>
                    <p>Short description: Nobita telling his story....</p>
                    <button class="play-btn" onclick="playVideo(this)" data-video="https://res.cloudinary.com/dtbsuuoa3/video/upload/v1782296088/Dora-ep3_omy3ai.mp4">
                        ▶ Play Episode 2
                    </button>
                </div>
            </div>
            <!-- Episode 3 -->
            <div class="card">
                <img src="https://res.cloudinary.com/dtbsuuoa3/image/upload/v1782175484/dora1_qokewy.jpg" alt="Episode 3">
                <div class="card-content">
                    <h3>Episode 3 - Daily Routine</h3>
                    <p>Short description: Nobita telling his Daily Routine...</p>
                    <button class="play-btn" onclick="playVideo(this)" data-video="https://res.cloudinary.com/dtbsuuoa3/video/upload/v1782296089/Dora-ep2_xj9gk9.mp4">
                        ▶ Play Episode 3
                    </button>
                </div>
            </div>

        </div>

        <!-- Video Player -->
        <div class="video-container" id="player" style="display:none;">
            <video id="videoPlayer"
playsinline
controls
autoplay>
</video>
        </div>
    </div>

    <script>
        function playVideo(btn) {
            const videoUrl = btn.getAttribute('data-video');
            const player = document.getElementById('player');
            const video = document.getElementById('videoPlayer');
            
            video.src = videoUrl;
            player.style.display = 'block';
            video.play();
            
            // Scroll to video
            player.scrollIntoView({ behavior: "smooth" });
        }
    </script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script>
const plyrPlayer = new Plyr('#videoPlayer', {
    controls: [
        'play',
        'progress',
        'current-time',
        'mute',
        'volume',
        'settings',
        'fullscreen'
    ]
});
</script>
</body>
</html>
